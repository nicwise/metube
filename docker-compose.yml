services:
  metube:
    build: .
    ports:
      - "8081:8081"
    volumes:
      - ./data/downloads:/downloads
      - ./data/nas:/nas
      - ./data/archive:/archive
    environment:
      - EXTRA_DOWNLOAD_DIRS={"NAS":"/nas","Archive":"/archive"}
      - CUSTOM_DIRS=true
      - CREATE_CUSTOM_DIRS=true
